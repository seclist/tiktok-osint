<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="lupin-api-origin" content="http://127.0.0.1:8080" />
    <title>TikTok OSINT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["system-ui", "-apple-system", "Segoe UI", "sans-serif"],
              mono: ["ui-monospace", "SFMono-Regular", "Menlo", "monospace"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-black text-white antialiased">
    <div class="max-w-2xl mx-auto px-5 py-16 md:py-24">
      <header class="mb-14">
        <h1 class="text-2xl font-light tracking-tight text-white">TikTok OSINT</h1>
        <p class="mt-1 text-sm text-neutral-500">Forensic profile lookup</p>
      </header>

      <form id="form" class="flex flex-col sm:flex-row gap-3 sm:gap-0 border-b border-neutral-700 pb-3">
        <input
          id="q"
          type="text"
          autocomplete="off"
          spellcheck="false"
          placeholder="username"
          class="flex-1 bg-transparent text-white placeholder:text-neutral-600 outline-none text-base font-mono"
        />
        <button
          type="submit"
          id="btn"
          class="shrink-0 text-xs uppercase tracking-[0.2em] text-black bg-white px-6 py-3 hover:bg-neutral-200 transition-colors"
        >
          Search
        </button>
      </form>

      <p id="loading" class="hidden mt-8 text-sm text-neutral-500 font-mono">Running scan…</p>
      <p id="err" class="hidden mt-8 text-sm text-neutral-400 border-l-2 border-white pl-4"></p>

      <article id="results" class="hidden mt-14 space-y-14"></article>

      <details id="rawbox" class="hidden mt-16 border-t border-neutral-800 pt-10">
        <summary class="cursor-pointer text-xs uppercase tracking-widest text-neutral-500 hover:text-neutral-300">
          Raw JSON
        </summary>
        <pre
          id="raw"
          class="mt-4 text-[11px] font-mono text-neutral-500 overflow-x-auto max-h-80 overflow-y-auto whitespace-pre-wrap break-all"
        ></pre>
      </details>
    </div>

    <script src="/dashboard/main.js"></script>
  </body>
</html>
